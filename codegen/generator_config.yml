provider:
  name: gigahost

resources:
  dns_zone:
    create:
      path: /dns/zones
      method: POST
    read:
      path: /dns/zones/{id}
      method: GET
    delete:
      path: /dns/zones/{id}
      method: DELETE
    schema:
      attributes:
        aliases:
          id: zone_id

data_sources:
  account:
    read:
      path: /account
      method: GET
    schema:
      ignores:
        - ssh_keys

  ssh_keys:
    read:
      path: /account
      method: GET
    schema:
      ignores:
        - cust_id
        - cust_name
        - cust_address
        - cust_zipcode
        - cust_city
        - cust_country
        - cust_phone
        - cust_email
        - cust_company_no
        - cust_billing_email

  dns_zones:
    read:
      path: /dns/zones
      method: GET
